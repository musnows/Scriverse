name: Publish develop Docker image

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-develop-publish
  cancel-in-progress: false

env:
  IMAGE_NAME: musnows/scriverse

jobs:
  publish:
    name: Build and publish develop image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v6
        with:
          ref: develop

      - name: Resolve develop commit
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=beta
            type=raw,value=${{ steps.commit.outputs.sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.commit.outputs.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=develop
          cache-to: type=gha,mode=max,scope=develop
